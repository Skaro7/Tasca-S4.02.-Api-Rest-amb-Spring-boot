# Server
server.port=8080

# MySQL - configurado via variables de entorno con valores por defecto para desarrollo
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/fruitdb?createDatabaseIfNotExist=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Disable open-in-view warning
spring.jpa.open-in-view=false